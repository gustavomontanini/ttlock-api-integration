<div id="view-lock" class="hidden w-full transition-opacity duration-300">
  <button
    id="btn-back-home"
    class="text-muted-foreground hover:text-foreground mb-6 flex items-center gap-2 font-medium transition-colors"
  >
    <svg
      xmlns="http://www.w3.org/2000/svg"
      width="20"
      height="20"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <path d="m15 18-6-6 6-6" />
    </svg>
    Voltar para a lista
  </button>

  <header class="mb-8 flex items-end justify-between">
    <div>
      <h2 id="lock-view-name" class="text-4xl font-bold tracking-tight">
        Nome da Fechadura
      </h2>
      <p class="text-muted-foreground mt-1">
        ID: <span id="lock-view-id" class="font-mono">---</span>
      </p>
    </div>
    <button
      id="btn-refresh-details"
      class="bg-muted text-muted-foreground hover:text-foreground rounded-lg p-2 transition-colors"
      title="Atualizar Detalhes"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="20"
        height="20"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
        <path d="M3 3v5h5" />
      </svg>
    </button>
  </header>

  <div
    id="lock-details-panel"
    class="bg-muted/30 border-border mb-6 grid grid-cols-2 gap-4 rounded-lg border p-4 text-sm md:grid-cols-4"
  >
    <div>
      <span class="text-muted-foreground block text-xs">Bateria</span
      ><strong id="detail-battery">--%</strong>
    </div>
    <div>
      <span class="text-muted-foreground block text-xs">MAC Address</span
      ><strong id="detail-mac">--:--:--</strong>
    </div>
    <div>
      <span class="text-muted-foreground block text-xs">Versão Firmware</span
      ><strong id="detail-firmware">--</strong>
    </div>
    <div>
      <span class="text-muted-foreground block text-xs">Modo Passagem</span
      ><strong id="detail-passage">--</strong>
    </div>
  </div>

  <section class="grid grid-cols-1 gap-6 md:grid-cols-2 lg:grid-cols-3">
    <!-- Abertura Remota -->
    <div
      class="bg-card border-border flex flex-col items-center justify-center gap-4 rounded-xl border p-6 text-center shadow-sm"
    >
      <h3 class="text-xl font-semibold">Abertura Remota</h3>
      <p class="text-muted-foreground mb-2 text-sm">
        Destrancar instantaneamente via Gateway.
      </p>
      <button
        id="btn-remote-unlock"
        class="bg-primary text-primary-foreground hover:bg-primary-hover w-full rounded-xl px-4 py-3 font-bold shadow-md transition-all"
      >
        Destrancar Agora
      </button>

      <button
        id="btn-go-passcode"
        class="bg-secondary text-secondary-foreground hover:bg-accent border-border flex w-full items-center justify-center gap-2 rounded-xl border px-4 py-3 font-bold transition-all"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <rect width="18" height="11" x="3" y="11" rx="2" ry="2" />
          <path d="M7 11V7a5 5 0 0 1 10 0v4" />
          <line x1="12" y1="16" x2="12" y2="16.01" />
        </svg>
        Registrar Senha
      </button>
    </div>

    <!-- Configurações -->

    <div
      class="bg-card border-border flex flex-col gap-4 rounded-xl border p-6 shadow-sm"
    >
      <h3 class="border-border border-b pb-2 text-xl font-semibold">
        Configurações
      </h3>

      <div class="flex flex-col gap-2">
        <label class="text-muted-foreground text-xs font-semibold uppercase"
          >Renomear Fechadura</label
        >
        <div class="flex gap-2">
          <input
            type="text"
            id="input-new-name"
            placeholder="Novo nome"
            class="border-border bg-background focus:border-primary min-w-0 flex-1 rounded-lg border px-3 py-2 text-sm focus:outline-none"
          />
          <button
            id="btn-rename"
            class="bg-secondary text-secondary-foreground hover:bg-muted shrink-0 rounded-lg px-3 py-2 text-sm font-semibold transition-colors"
          >
            Salvar
          </button>
        </div>
      </div>

      <div class="flex flex-col gap-2">
        <label class="text-muted-foreground text-xs font-semibold uppercase"
          >Alterar Senha de Administrador</label
        >
        <div class="flex gap-2">
          <input
            type="password"
            id="input-super-passcode"
            placeholder="Nova senha (4-9 digitos)"
            class="border-border bg-background focus:border-primary min-w-0 flex-1 rounded-lg border px-3 py-2 text-sm focus:outline-none"
          />
          <button
            id="btn-change-passcode"
            class="bg-secondary text-secondary-foreground hover:bg-muted shrink-0 rounded-lg px-3 py-2 text-sm font-semibold transition-colors"
          >
            Salvar
          </button>
        </div>
      </div>

      <div class="flex flex-col gap-2">
        <label class="text-muted-foreground text-xs font-semibold uppercase"
          >Modo Passagem</label
        >
        <div class="flex gap-2">
          <select
            id="select-passage-mode"
            class="border-border bg-background focus:border-primary min-w-0 flex-1 rounded-lg border px-3 py-2 text-sm focus:outline-none"
          >
            <option value="0">Desativado (Tranca automaticamente)</option>
            <option value="1">Ativado (Sempre aberta)</option>
          </select>
          <button
            id="btn-config-passage"
            class="bg-secondary text-secondary-foreground hover:bg-muted shrink-0 rounded-lg px-3 py-2 text-sm font-semibold transition-colors"
          >
            Aplicar
          </button>
        </div>
      </div>
    </div>

    <!-- Zona de Perigo -->
    <div
      class="bg-card flex flex-col items-center justify-center gap-4 rounded-xl border border-red-900/30 p-6 text-center shadow-sm"
    >
      <h3 class="text-xl font-semibold text-red-500">Zona de Perigo</h3>
      <p class="text-muted-foreground mb-2 text-sm">
        Excluir esta fechadura apagará todos os dados, senhas e biometrias
        permanentemente.
      </p>
      <button
        id="btn-delete-lock"
        class="bg-destructive text-destructive-foreground w-full rounded-xl px-4 py-3 font-bold shadow-md transition-all hover:bg-red-600"
      >
        Excluir Fechadura
      </button>
    </div>
  </section>
</div>
