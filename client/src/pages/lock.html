<div id="view-lock" class="hidden w-full transition-opacity duration-300">
  <button
    id="btn-back-home"
    class="text-muted-foreground hover:text-primary cursor-pointer mb-6 flex items-center gap-2 font-medium transition-colors corsourpointer"
  >
    <svg
      xmlns="http://www.w3.org/2000/svg"
      width="20"
      height="20"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <path d="m15 18-6-6 6-6" />
    </svg>
    Voltar para a lista
  </button>

  <header class="mb-8 flex items-end justify-between">
    <div>
      <h2 id="lock-view-name" class="text-4xl font-bold text-primary tracking-tight">
        Nome da Fechadura
      </h2>
      <p class="text-muted-foreground mt-1">
        ID: <span id="lock-view-id" class="font-mono">---</span>
      </p>
    </div>

    <button
      id="btn-go-lock-settings"
      class="bg-muted text-muted-foreground hover:text-foreground hover:bg-secondary rounded-lg p-2 transition-colors cursor-pointer"
      title="Configurações Avançadas"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="20"
        height="20"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path
          d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.72v-.51a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"
        />
        <circle cx="12" cy="12" r="3" />
      </svg>
    </button>
  </header>

  <div
    id="lock-details-panel"
    class="bg-muted/30 border-border relative mb-6 grid grid-cols-2 gap-4 rounded-lg border p-4 text-sm md:grid-cols-4"
  >
    <button
      id="btn-refresh-details"
      class="bg-muted text-muted-foreground hover:bg-secondary hover:text-foreground absolute top-3 right-3 rounded-md p-1.5 transition-colors cursor-pointer"
      title="Atualizar Detalhes"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="18"
        height="18"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
        <path d="M3 3v5h5" />
      </svg>
    </button>

    <div>
      <span class="text-muted-foreground block text-xs">Bateria</span>
      <strong id="detail-battery">--%</strong>
    </div>
    <div>
      <span class="text-muted-foreground block text-xs">MAC Address</span>
      <strong id="detail-mac">--:--:--</strong>
    </div>
    <div>
      <span class="text-muted-foreground block text-xs">Versão Firmware</span>
      <strong id="detail-firmware">--</strong>
    </div>
    <div>
      <span class="text-muted-foreground block text-xs">Modo Passagem</span>
      <strong id="detail-passage">--</strong>
    </div>
  </div>

  <section class="grid grid-cols-1 gap-6 md:grid-cols-5">
    <div
      class="bg-card border-border flex flex-col items-center justify-center gap-4 rounded-xl border p-6 text-center shadow-sm md:col-span-2"
    >
      <h3 class="text-xl font-semibold">Abertura Remota</h3>
      <p class="text-muted-foreground mb-2 text-sm">
        Destrancar instantaneamente via Gateway.
      </p>
      <button
        id="btn-remote-unlock"
        class="bg-secondary text-secondary-foreground hover:bg-accent w-full rounded-xl px-4 py-3 font-bold shadow-md transition-all cursor-pointer"
      >
        Destrancar Agora
      </button>
    </div>

    <div
      class="bg-card border-border flex flex-col justify-between gap-4 rounded-xl border p-6 shadow-sm md:col-span-3"
    >
      <div>
        <h3 class="border-border border-b pb-2 text-xl font-semibold">
          Registros
        </h3>
        <p class="text-muted-foreground mt-3 text-sm">
          Gerencie os métodos de acesso associados a esta fechadura.
        </p>
      </div>

      <div class="mt-2 grid grid-cols-1 gap-4 sm:grid-cols-3">
        <button
          id="btn-go-passcode"
          class="bg-secondary text-secondary-foreground hover:bg-accent border-border flex flex-col items-center justify-center gap-2 rounded-xl border px-2 py-4 font-bold transition-all cursor-pointer"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect width="18" height="11" x="3" y="11" rx="2" ry="2" />
            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            <line x1="12" y1="16" x2="12" y2="16.01" />
          </svg>
          <span class="text-sm">Senhas</span>
        </button>

        <button
          id="btn-go-rfid"
          class="bg-secondary text-secondary-foreground hover:bg-accent border-border flex flex-col items-center justify-center gap-2 rounded-xl border px-2 py-4 font-bold transition-all cursor-pointer"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect width="20" height="14" x="2" y="5" rx="2" ry="2" />
            <line x1="2" y1="10" x2="22" y2="10" />
          </svg>
          <span class="text-sm">Cartões</span>
        </button>

        <button
          id="btn-go-fingerprint"
          class="bg-secondary text-secondary-foreground hover:bg-accent border-border flex flex-col items-center justify-center gap-2 rounded-xl border px-2 py-4 font-bold transition-all cursor-pointer"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M12 10a2 2 0 0 0-2 2c0 1.02-.1 2.51-.26 4" />
            <path d="M15.29 14c.18 1 .44 2.15.82 3" />
            <path d="M16 8a4 4 0 0 0-8 0c0 1.13.3 2.5 1 4" />
            <path d="M17.58 6.64a6 6 0 0 0-11.16 0" />
            <path d="M18.83 18.23a10 10 0 0 0-13.66 0" />
            <path d="M2 12c0-5.52 4.48-10 10-10s10 4.48 10 10" />
            <path d="M6 14.5c.2-.95.5-1.93.9-2.9" />
          </svg>
          <span class="text-sm">Biometria</span>
        </button>
      </div>
    </div>
  </section>
</div>
