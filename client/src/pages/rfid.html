<div
  id="view-rfid"
  class="mx-auto hidden w-full max-w-5xl transition-opacity duration-300"
>
  <button
    id="btn-back-lock-rfid"
    class="text-muted-foreground hover:text-foreground mb-6 flex items-center gap-2 font-medium transition-colors"
  >
    <svg
      xmlns="http://www.w3.org/2000/svg"
      width="20"
      height="20"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <path d="m15 18-6-6 6-6" />
    </svg>
    Voltar para a fechadura
  </button>

  <header class="mb-8">
    <div class="mb-1 flex items-center gap-3">
      <div class="bg-primary/10 text-primary rounded-lg p-2">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="22"
          height="22"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <rect width="20" height="14" x="2" y="5" rx="2" ry="2" />
          <line x1="2" y1="10" x2="22" y2="10" />
        </svg>
      </div>
      <h2 class="text-3xl font-bold tracking-tight">Registrar Cartão RFID</h2>
    </div>
    <p class="text-muted-foreground mt-1 ml-1">
      Fechadura:
      <span id="rfid-lock-name" class="text-foreground font-semibold">---</span>
    </p>
  </header>

  <div
    class="bg-card border-border w-full overflow-hidden rounded-2xl border shadow-sm"
  >
    <div class="border-border bg-muted/30 border-b p-4">
      <p
        class="text-muted-foreground mb-3 text-xs font-semibold tracking-wider uppercase"
      >
        Validade do Cartão
      </p>
      <div class="flex flex-wrap gap-2" id="rfid-type-tabs">
        <button
          class="rfid-tab active-tab bg-primary text-primary-foreground border-primary rounded-lg border px-4 py-2 text-sm font-semibold shadow-sm transition-all"
          data-type="1"
        >
          Permanente
        </button>
        <button
          class="rfid-tab text-muted-foreground hover:text-foreground hover:bg-muted rounded-lg border border-transparent px-4 py-2 text-sm font-semibold transition-all"
          data-type="2"
        >
          Temporário
        </button>
      </div>
    </div>

    <div class="flex flex-col gap-6 p-6 sm:p-8">
      <div class="grid grid-cols-1 gap-6 sm:grid-cols-2">
        <div class="flex flex-col gap-1.5">
          <label
            class="text-muted-foreground text-xs font-semibold tracking-wide uppercase"
            >Nome do Cartão</label
          >
          <input
            type="text"
            id="input-rfid-name"
            placeholder="Ex: Cartão da Limpeza"
            class="border-border bg-background focus:ring-primary rounded-lg border px-3 py-2.5 text-sm transition-all focus:ring-2 focus:outline-none"
          />
        </div>
        <div class="flex flex-col gap-1.5">
          <label
            class="text-muted-foreground text-xs font-semibold tracking-wide uppercase"
            >Número do Cartão <span class="text-red-500">*</span></label
          >
          <input
            type="text"
            id="input-rfid-number"
            placeholder="Ex: 1234567890"
            class="border-border bg-background focus:ring-primary rounded-lg border px-3 py-2.5 text-sm transition-all focus:ring-2 focus:outline-none"
          />
        </div>
      </div>

      <div
        id="rfid-date-fields"
        class="border-border mt-2 hidden flex-col gap-4 border-t pt-6"
      >
        <div class="grid grid-cols-1 gap-6 sm:grid-cols-2">
          <div class="flex flex-col gap-1.5">
            <label
              class="text-muted-foreground text-xs font-semibold tracking-wide uppercase"
              >Data de Início</label
            >
            <input
              type="datetime-local"
              id="rfid-start-date"
              class="border-border bg-background rounded-lg border px-3 py-2.5 text-sm transition-all"
            />
          </div>
          <div class="flex flex-col gap-1.5">
            <label
              class="text-muted-foreground text-xs font-semibold tracking-wide uppercase"
              >Data de Término</label
            >
            <input
              type="datetime-local"
              id="rfid-end-date"
              class="border-border bg-background rounded-lg border px-3 py-2.5 text-sm transition-all"
            />
          </div>
        </div>
      </div>

      <button
        id="btn-add-rfid"
        class="bg-primary text-primary-foreground hover:bg-primary-hover mt-4 flex w-full items-center justify-center gap-2 rounded-xl px-4 py-4 text-base font-bold shadow-md transition-all"
      >
        <span id="btn-add-rfid-text">Adicionar Cartão via Gateway</span>
      </button>

      <div id="rfid-result" class="mt-4 hidden">
        <div
          class="border-primary/30 bg-primary/5 flex flex-col items-center gap-3 rounded-xl border-2 p-6 text-center"
        >
          <svg
            class="text-primary"
            xmlns="http://www.w3.org/2000/svg"
            width="32"
            height="32"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
            <polyline points="22 4 12 14.01 9 11.01" />
          </svg>
          <p class="text-foreground text-lg font-bold">
            Cartão registrado com sucesso!
          </p>
          <p class="text-muted-foreground mt-1 max-w-sm text-sm">
            O Gateway sincronizou o número do cartão com a fechadura. Ele já
            pode ser utilizado.
          </p>
        </div>
      </div>

      <div
        id="rfid-error"
        class="mt-4 hidden rounded-xl border border-red-300/40 bg-red-50/10 p-4 text-sm text-red-400"
      >
        <span id="rfid-error-text">Falha ao comunicar com o Gateway.</span>
      </div>
    </div>
  </div>
</div>
