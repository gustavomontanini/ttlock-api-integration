<div
  id="view-passcode"
  class="mx-auto hidden w-full max-w-5xl transition-opacity duration-300"
>
  <button
    id="btn-back-lock"
    class="text-muted-foreground hover:text-primary mb-6 flex cursor-pointer items-center gap-2 font-medium transition-colors"
  >
    <svg
      xmlns="http://www.w3.org/2000/svg"
      width="20"
      height="20"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <path d="m15 18-6-6 6-6" />
    </svg>
    Voltar para a fechadura
  </button>

  <header class="mb-8">
    <div class="mb-1 flex items-center gap-3">
      <div class="bg-primary/10 text-primary rounded-lg p-2">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="22"
          height="22"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <rect width="18" height="11" x="3" y="11" rx="2" ry="2" />
          <path d="M7 11V7a5 5 0 0 1 10 0v4" />
          <line x1="12" y1="16" x2="12" y2="16.01" />
        </svg>
      </div>
      <h2 class="text-primary text-3xl font-bold tracking-tight">
        Registrar Senha
      </h2>
    </div>
    <p class="text-muted-foreground mt-1 ml-1">
      Fechadura:
      <span id="passcode-lock-name" class="text-foreground font-semibold"
        >---</span
      >
    </p>
  </header>

  <div
    class="bg-card border-border w-full overflow-hidden rounded-2xl border shadow-sm"
  >
    <div class="border-border bg-muted/30 border-b p-4">
      <p
        class="text-muted-foreground mb-3 text-xs font-semibold tracking-wider uppercase"
      >
        Tipo de Senha
      </p>
      <div class="flex flex-wrap gap-2" id="passcode-type-tabs">
        <button
          class="passcode-tab active-tab bg-secondary text-secondary-foreground border-secondary rounded-lg border px-4 py-2 text-sm font-semibold shadow-sm transition-all"
          data-type="2"
        >
          Permanente
        </button>
        <button
          class="passcode-tab text-muted-foreground hover:text-foreground hover:bg-muted rounded-lg border border-transparent px-4 py-2 text-sm font-semibold transition-all"
          data-type="3"
        >
          Temporária
        </button>
        <button
          class="passcode-tab text-muted-foreground hover:text-foreground hover:bg-muted rounded-lg border border-transparent px-4 py-2 text-sm font-semibold transition-all"
          data-type="1"
        >
          Uso Único
        </button>
        <button
          class="passcode-tab text-muted-foreground hover:text-foreground hover:bg-muted rounded-lg border border-transparent px-4 py-2 text-sm font-semibold transition-all"
          data-type="4"
        >
          Apagar Senha
        </button>
        <button
          class="passcode-tab text-muted-foreground hover:text-foreground hover:bg-muted rounded-lg border border-transparent px-4 py-2 text-sm font-semibold transition-all"
          data-type="6"
        >
          Cíclica
        </button>
      </div>
    </div>

    <div class="flex flex-col gap-6 p-6 sm:p-8">
      <div
        id="passcode-type-description"
        class="bg-secondary/5 border-secondary/20 flex items-start gap-3 rounded-lg border p-4"
      >
        <svg
          class="text-secondary mt-0.5 shrink-0"
          xmlns="http://www.w3.org/2000/svg"
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="12" cy="12" r="10" />
          <path d="M12 16v-4" />
          <path d="M12 8h.01" />
        </svg>
        <p
          id="passcode-type-desc-text"
          class="text-muted-foreground text-sm leading-relaxed"
        ></p>
      </div>

      <div id="passcode-custom-input-group" class="hidden flex-col gap-1.5">
        <label
          class="text-muted-foreground text-xs font-semibold tracking-wide uppercase"
          >Senha Desejada (4 a 9 dígitos)</label
        >
        <input
          type="text"
          id="input-custom-passcode"
          placeholder="Ex: 123456"
          class="border-border bg-background focus:ring-secondary rounded-lg border px-3 py-2.5 text-sm transition-all focus:ring-2 focus:outline-none"
        />
      </div>

      <div id="passcode-date-fields" class="hidden flex-col gap-4">
        <div class="grid grid-cols-1 gap-6 sm:grid-cols-2">
          <div class="flex flex-col gap-1.5">
            <label
              class="text-muted-foreground text-xs font-semibold tracking-wide uppercase"
              >Data de Início</label
            >
            <input
              type="datetime-local"
              id="passcode-start-date"
              class="border-border bg-background focus:ring-secondary rounded-lg border px-3 py-2.5 text-sm transition-all focus:ring-2 focus:outline-none"
            />
          </div>
          <div class="flex flex-col gap-1.5">
            <label
              class="text-muted-foreground text-xs font-semibold tracking-wide uppercase"
              >Data de Término</label
            >
            <input
              type="datetime-local"
              id="passcode-end-date"
              class="border-border bg-background focus:ring-secondary rounded-lg border px-3 py-2.5 text-sm transition-all focus:ring-2 focus:outline-none"
            />
          </div>
        </div>
      </div>

      <div
        id="passcode-cyclic-fields"
        class="border-border mt-2 hidden flex-col gap-4 border-t pt-6"
      >
        <div class="flex flex-col gap-2">
          <label
            class="text-muted-foreground text-xs font-semibold tracking-wide uppercase"
            >Dias da Semana</label
          >
          <div class="flex flex-wrap gap-2">
            <label
              class="bg-muted/50 border-border hover:bg-muted flex cursor-pointer items-center gap-1.5 rounded border px-3 py-2 text-sm transition-colors"
              ><input type="checkbox" value="1" class="day-checkbox" />
              Seg</label
            >
            <label
              class="bg-muted/50 border-border hover:bg-muted flex cursor-pointer items-center gap-1.5 rounded border px-3 py-2 text-sm transition-colors"
              ><input type="checkbox" value="2" class="day-checkbox" />
              Ter</label
            >
            <label
              class="bg-muted/50 border-border hover:bg-muted flex cursor-pointer items-center gap-1.5 rounded border px-3 py-2 text-sm transition-colors"
              ><input type="checkbox" value="3" class="day-checkbox" />
              Qua</label
            >
            <label
              class="bg-muted/50 border-border hover:bg-muted flex cursor-pointer items-center gap-1.5 rounded border px-3 py-2 text-sm transition-colors"
              ><input type="checkbox" value="4" class="day-checkbox" />
              Qui</label
            >
            <label
              class="bg-muted/50 border-border hover:bg-muted flex cursor-pointer items-center gap-1.5 rounded border px-3 py-2 text-sm transition-colors"
              ><input type="checkbox" value="5" class="day-checkbox" />
              Sex</label
            >
            <label
              class="bg-muted/50 border-border hover:bg-muted flex cursor-pointer items-center gap-1.5 rounded border px-3 py-2 text-sm transition-colors"
              ><input type="checkbox" value="6" class="day-checkbox" />
              Sáb</label
            >
            <label
              class="bg-muted/50 border-border hover:bg-muted flex cursor-pointer items-center gap-1.5 rounded border px-3 py-2 text-sm transition-colors"
              ><input type="checkbox" value="7" class="day-checkbox" />
              Dom</label
            >
          </div>
        </div>
        <div class="mt-2 grid grid-cols-1 gap-6 sm:grid-cols-2">
          <div class="flex flex-col gap-1.5">
            <label
              class="text-muted-foreground text-xs font-semibold tracking-wide uppercase"
              >Hora de Início</label
            >
            <input
              type="time"
              id="passcode-start-time"
              value="09:00"
              class="border-border bg-background focus:ring-secondary rounded-lg border px-3 py-2.5 text-sm transition-all focus:ring-2 focus:outline-none"
            />
          </div>
          <div class="flex flex-col gap-1.5">
            <label
              class="text-muted-foreground text-xs font-semibold tracking-wide uppercase"
              >Hora de Término</label
            >
            <input
              type="time"
              id="passcode-end-time"
              value="17:00"
              class="border-border bg-background focus:ring-secondary rounded-lg border px-3 py-2.5 text-sm transition-all focus:ring-2 focus:outline-none"
            />
          </div>
        </div>
      </div>

      <button
        id="btn-generate-passcode"
        class="bg-secondary text-secondary-foreground hover:bg-secondary-hover mt-4 flex w-full items-center justify-center gap-2 rounded-xl px-4 py-4 text-base font-bold shadow-md transition-all disabled:cursor-not-allowed disabled:opacity-60"
      >
        <span id="btn-generate-text">Gerar Senha</span>
      </button>

      <div id="passcode-result" class="mt-4 hidden">
        <div
          class="border-primary/30 bg-secondary/20 flex flex-col items-center gap-3 rounded-xl border-2 p-6 text-center"
        >
          <p class="text-muted-foreground text-sm font-medium">
            Senha registrada com sucesso
          </p>
          <div class="flex items-center gap-3">
            <span
              id="passcode-result-value"
              class="text-primary font-mono text-5xl font-black tracking-[0.25em]"
              >------</span
            >
          </div>
          <p
            id="passcode-result-validity"
            class="text-muted-foreground mt-2 text-sm"
          ></p>
        </div>
      </div>

      <div
        id="passcode-error"
        class="mt-4 hidden rounded-xl border border-red-300/40 bg-red-50/10 p-4 text-sm text-red-400"
      >
        <span id="passcode-error-text">Falha ao gerar senha.</span>
      </div>
    </div>
  </div>
</div>
