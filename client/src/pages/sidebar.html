<div
  id="sidebar-overlay"
  class="fixed inset-0 z-40 hidden bg-black/50 opacity-0 transition-opacity"
></div>
<aside
  id="sidebar"
  class="bg-card border-border fixed top-0 left-0 z-50 flex h-full w-64 -translate-x-full transform flex-col border-r transition-transform duration-300 ease-in-out"
>
  <div class="border-border flex items-center justify-between border-b p-6">
    <h2 class="text-xl font-black tracking-tight">Pado Menu</h2>
    <button
      id="btn-close-sidebar"
      class="text-muted-foreground hover:text-primary transition-colors cursor-pointer"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="24"
        height="24"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
  </div>

  <nav class="flex flex-1 flex-col gap-2 p-4">
    <a
      href="#"
      id="btn-sidebar-home"
      class="sidebar-link text-muted-foreground hover:bg-muted hover:text-foreground rounded-lg px-4 py-3 transition-colors"
      >Home</a
    >
    <a
      href="#"
      id="btn-sidebar-tests"
      class="sidebar-link text-muted-foreground hover:bg-muted hover:text-foreground rounded-lg px-4 py-3 transition-colors"
      >Testes</a
    >
    <a
      href="#"
      id="btn-sidebar-reports"
      class="sidebar-link text-muted-foreground hover:bg-muted hover:text-foreground rounded-lg px-4 py-3 transition-colors"
      >Relatórios</a
    >
    <a
      href="#"
      id="btn-sidebar-settings"
      class="sidebar-link text-muted-foreground hover:bg-muted hover:text-foreground rounded-lg px-4 py-3 transition-colors"
      >Configurações</a
    >
  </nav>

  <div class="border-border border-t p-4">
    <button
      id="btn-logout"
      class="bg-destructive/10 cursor-pointer text-destructive hover:bg-destructive/20 w-full rounded-lg px-4 py-2 font-semibold transition-colors"
    >
      Sair da Conta
    </button>
  </div>
</aside>
