<div
  id="sidebar-overlay"
  class="fixed inset-0 bg-black/50 z-40 hidden transition-opacity opacity-0"
></div>
<aside
  id="sidebar"
  class="fixed top-0 left-0 h-full w-64 bg-card border-r border-border z-50 transform -translate-x-full transition-transform duration-300 ease-in-out flex flex-col"
>
  <div class="p-6 border-b border-border flex justify-between items-center">
    <h2 class="text-xl font-black tracking-tight">Pado Menu</h2>
    <button
      id="btn-close-sidebar"
      class="text-muted-foreground hover:text-foreground"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="24"
        height="24"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
  </div>
  <nav class="flex-1 p-4 flex flex-col gap-2">
    <a
      href="#"
      id="btn-sidebar-home"
      class="px-4 py-3 rounded-lg bg-primary/10 text-primary font-semibold"
      >Home</a
    >
    <a
      href="#"
      class="px-4 py-3 rounded-lg text-muted-foreground hover:bg-muted hover:text-foreground transition-colors"
      >Testes</a
    >
    <a
      href="#"
      class="px-4 py-3 rounded-lg text-muted-foreground hover:bg-muted hover:text-foreground transition-colors"
      >Relatórios</a
    >
    <a
      href="#"
      class="px-4 py-3 rounded-lg text-muted-foreground hover:bg-muted hover:text-foreground transition-colors"
      >Configurações</a
    >
  </nav>
  <div class="p-4 border-t border-border">
    <button
      id="btn-logout"
      class="w-full px-4 py-2 bg-destructive/10 text-destructive rounded-lg font-semibold hover:bg-destructive/20 transition-colors"
    >
      Sair da Conta
    </button>
  </div>
</aside>
