<div id="view-home" class="block transition-opacity duration-300">
  <header class="mb-6">
    <h2 class="text-primary text-3xl font-bold tracking-tight">
      Meus Dispositivos
    </h2>
    <p class="text-muted-foreground mt-1">
      Selecione uma fechadura para gerenciar.
    </p>
  </header>
  <section
    class="bg-card border-border overflow-hidden rounded-xl border shadow-sm"
  >
    <div
      class="border-border bg-muted/10 flex flex-col items-start justify-between gap-4 border-b p-4 sm:flex-row sm:items-center sm:p-6"
    >
      <h3 class="text-xl font-semibold">Lista de Fechaduras</h3>

      <div
        class="bg-muted/50 border-border/50 flex items-center rounded-lg border p-1"
      >
        <button
          id="tab-online"
          class="active-tab bg-background text-foreground cursor-pointer rounded-md px-5 py-1.5 text-sm font-bold shadow-sm transition-all"
        >
          Online
        </button>
        <button
          id="tab-offline"
          class="text-muted-foreground hover:text-foreground cursor-pointer rounded-md px-5 py-1.5 text-sm font-medium transition-all"
        >
          Offline
        </button>
      </div>
    </div>
    <div class="overflow-x-auto">
      <table
        id="device-table"
        class="w-full border-collapse text-left"
        style="display: none"
      >
        <thead>
          <tr
            class="bg-muted/30 text-muted-foreground border-border border-b text-xs tracking-wider uppercase"
          >
            <th class="px-6 text-center font-semibold">Nome da Fechadura</th>
            <th class="px-6 py-4 text-center font-semibold">ID da Fechadura</th>
            <th class="px-6 py-4 text-center font-semibold">Bateria</th>
            <th class="px-6 py-4 text-center font-semibold">Ação</th>
          </tr>
        </thead>
        <tbody id="device-list-body" class="divide-border divide-y"></tbody>
      </table>
      <div
        id="no-devices"
        class="text-muted-foreground p-10 text-center text-sm"
      >
        Nenhum dispositivo carregado.
      </div>
    </div>
  </section>
</div>
