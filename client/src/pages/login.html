<div
  id="login-screen"
  class="fixed inset-0 flex items-center justify-center bg-black/80 backdrop-blur-sm z-50 overflow-hidden"
>
  <div
    class="absolute inset-0 w-full h-full overflow-hidden pointer-events-none z-0"
  >
    <div
      class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] bg-[#c603fc] rounded-full mix-blend-screen filter blur-[120px] opacity-25 animate-blob"
    ></div>
    <div
      class="absolute top-[20%] right-[-10%] w-[40vw] h-[40vw] bg-[#fcfcfc] rounded-full mix-blend-screen filter blur-[300px] opacity-10 animate-blob animation-delay-2000"
    ></div>
    <div
      class="absolute bottom-[-20%] left-[20%] w-[60vw] h-[60vw] bg-primary rounded-full mix-blend-screen filter blur-[130px] opacity-20 animate-blob animation-delay-4000"
    ></div>
  </div>
  <div
    class="bg-card text-card-foreground border border-border p-4 rounded-2x1 shadow-2xl w-full max-w-220 flex flex-col gap-5 z-10 relative"
  >
    <h2 class="text-3xl font-black tracking-wide text-center">Pado TestLock</h2>
    <p class="text-base text-center italic text-muted-foreground">
      Insira as credenciais da sua conta Pado Digital Locking
    </p>
    <div class="flex flex-col gap-3 relative">
      <input
        type="text"
        id="username"
        placeholder="E-mail"
        class="w-full px-4 py-3 rounded-lg border border-border bg-black/80 focus:outline-none focus:ring-2 focus:ring-primary transition-all"
      />
      <div class="relative w-full">
        <input
          type="password"
          id="password"
          placeholder="Senha"
          class="w-full px-4 py-3 pr-12 rounded-lg border border-border bg-black/80 focus:outline-none focus:ring-2 focus:ring-primary transition-all"
        />
        <button
          type="button"
          id="toggle-password"
          class="absolute right-4 top-1/2 -translate-y-1/2 text-muted-foreground hover:text-foreground transition-colors cursor-pointer focus:outline-none"
        >
          <svg
            id="eye-icon"
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
        </button>
      </div>
    </div>
    <button
      id="btn-enter-app"
      class="w-full bg-primary text-primary-foreground hover:bg-primary-hover px-4 py-3 rounded-lg font-semibold transition-colors mt-2 shadow-md"
    >
      Entrar no Sistema
    </button>
  </div>
</div>
